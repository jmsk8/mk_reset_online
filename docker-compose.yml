services:
  db:
      image: postgres:17-alpine
      volumes:
        - pg_data:/var/lib/postgresql/data
        - ./backEnd/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
        - ./backEnd/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
      restart: unless-stopped
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
        interval: 5s
        timeout: 5s
        retries: 5
      networks:
        - backend

  backend:
    build:
      context: ./backEnd
      dockerfile: Dockerfile.backend
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./backups:/app/backups
      - ./backEnd/backend.py:/app/backend.py
      - ./backEnd/constants.py:/app/constants.py
      - ./backEnd/db.py:/app/db.py
      - ./backEnd/cache.py:/app/cache.py
      - ./backEnd/auth.py:/app/auth.py
      - ./backEnd/utils.py:/app/utils.py
      - ./backEnd/services.py:/app/services.py
      - ./backEnd/routes_public.py:/app/routes_public.py
      - ./backEnd/routes_admin.py:/app/routes_admin.py

    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - backend

  frontend:
    build:
      context: ./frontEnd
      dockerfile: Dockerfile.frontend
    expose:
      - "5000"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8080
      - SECRET_KEY=${SECRET_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    networks:
      - frontend
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    networks:
      - frontend

volumes:
  pg_data:

networks:
  frontend:
  backend:
